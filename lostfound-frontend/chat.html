<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chat</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Inter;
  background: #000;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  padding: 14px;
  background: #050505;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.msg-wrapper { margin-bottom: 10px; }

.msg {
  max-width: 65%;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.4;
  margin-bottom: 6px;
}

/* SENT */
.me {
  align-self: flex-end;
  background: #1f2937;
  border: 1px solid #374151;
}

/* RECEIVED */
.other {
  align-self: flex-start;
  background: #111827;
  border: 1px solid #1f2937;
}

.input-area {
  display: flex;
  padding: 10px;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

input {
  flex: 1;
  padding: 10px;
  background: #111;
  border: 1px solid #222;
  color: white;
}

button {
  margin-left: 10px;
}
</style>

</head>

<body>

<div class="header">💬 Chat</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
  <input id="msgInput" placeholder="Type message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API = "https://lostfound-backend-52mp.onrender.com";

// 🔥 CONNECT SOCKET
const socket = io(API);

let currentUser = null;
let itemId = new URLSearchParams(window.location.search).get("itemId");

/* AUTH */
async function checkAuth() {
  const res = await fetch("/.auth/me");
  const data = await res.json();

  if (!data.clientPrincipal) {
    window.location.href = "/login";
    return;
  }

  currentUser = data.clientPrincipal.userDetails;

  // JOIN ROOM
  socket.emit("joinRoom", { itemId });

  loadMessages();
}

/* LOAD OLD MESSAGES */
async function loadMessages() {
  const res = await fetch(API + "/messages/" + itemId);
  const data = await res.json();

  document.getElementById("chatBox").innerHTML = "";

  data.forEach(addMessage);
}

/* SEND MESSAGE */
function sendMessage() {
  const input = document.getElementById("msgInput");
  const message = input.value.trim();

  if (!message) return;

  // 🔥 SHOW IN UI IMMEDIATELY
  addMessage({
    sender: currentUser,
    message,
    timestamp: new Date()
  });

  // 🔥 SEND TO SERVER
  socket.emit("sendMessage", {
    itemId,
    message,
    user: currentUser
  });

  input.value = "";
}

/* RECEIVE MESSAGE */
socket.on("receiveMessage", (msg) => {
  if (msg.sender !== currentUser) {
    addMessage(msg);
  }
});

/* UI ADD */
function formatTime(ts) {
  const d = new Date(ts || new Date());
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');
}

function addMessage(msg) {
  const chat = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "msg " + (msg.sender === currentUser ? "me" : "other");

  div.innerHTML = `
  <div>${msg.message}</div>
  <div class="meta">${formatTime(msg.timestamp)}</div>
`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

checkAuth();
</script>

</body>
</html>
