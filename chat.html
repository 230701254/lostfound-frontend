<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chat</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  padding: 14px;
  background: #050505;
  border-bottom: 1px solid #1a1a1a;
}

.back {
  margin-right: 12px;
  cursor: pointer;
  color: #aaa;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.msg-wrapper {
  display: flex;
  flex-direction: column;
  margin-bottom: 12px;
}

.msg {
  max-width: 65%;
  padding: 10px 12px;
  border-radius: 10px;
}

.me {
  align-self: flex-end;
  background: #111;
}

.other {
  align-self: flex-start;
  background: #050505;
}

.meta {
  font-size: 10px;
  color: #888;
  margin-top: 4px;
}

.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #1a1a1a;
}

input {
  flex: 1;
  padding: 10px;
  background: #111;
  border: 1px solid #222;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px;
  background: #111;
  border: 1px solid #222;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <span class="back" onclick="goBack()">⬅</span>
  <h3>Chat</h3>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
  <input id="msgInput" placeholder="Type a message..." />
  <button onclick="sendMessage()">➤</button>
</div>

<script>
const API = "https://lostfound-backend-52mp.onrender.com";
const socket = io(API);

let currentUser = null;
let itemId = new URLSearchParams(window.location.search).get("itemId");

/* AUTH */
async function checkAuth() {
  const res = await fetch("/.auth/me");
  const data = await res.json();

  currentUser = data.clientPrincipal.userDetails;

  // 🔥 join room
  socket.emit("joinRoom", { itemId });

  loadMessages();
}

/* LOAD OLD MESSAGES */
async function loadMessages() {
  const res = await fetch(API + "/messages/" + itemId);
  const data = await res.json();

  const chat = document.getElementById("chatBox");
  chat.innerHTML = "";

  data.forEach(addMessage);
}

/* ADD MESSAGE UI */
function addMessage(msg) {
  const chat = document.getElementById("chatBox");

  const wrapper = document.createElement("div");
  wrapper.className = "msg-wrapper";

  const div = document.createElement("div");
  div.className = "msg " + (msg.sender === currentUser ? "me" : "other");

  div.innerHTML = `
    <div>${msg.message}</div>
    <div class="meta">${formatTime(msg.timestamp)}</div>
  `;

  wrapper.appendChild(div);
  chat.appendChild(wrapper);

  chat.scrollTop = chat.scrollHeight;
}

/* SEND MESSAGE */
function sendMessage() {
  const input = document.getElementById("msgInput");
  const message = input.value.trim();

  if (!message) return;

  socket.emit("sendMessage", {
    itemId,
    message,
    user: currentUser // 🔥 IMPORTANT FIX
  });

  input.value = "";
}

/* RECEIVE REAL-TIME */
socket.on("receiveMessage", (msg) => {
  addMessage(msg);
});

/* TIME */
function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');
}

function goBack() {
  window.history.back();
}

/* INIT */
checkAuth();
</script>

</body>
</html>
