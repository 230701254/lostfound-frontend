<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chat</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 14px;
  background: #050505;
  border-bottom: 1px solid #1a1a1a;
}

.back {
  margin-right: 12px;
  cursor: pointer;
  color: #aaa;
}

.header h3 {
  margin: 0;
  font-size: 16px;
}

/* CHAT AREA */
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

/* MESSAGE WRAPPER */
.msg-wrapper {
  display: flex;
  flex-direction: column;
  margin-bottom: 12px;
}

/* MESSAGE BUBBLE */
.msg {
  max-width: 65%;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.4;
}

/* SENT */
.me {
  align-self: flex-end;
  background: #111;
  border: 1px solid #222;
}

/* RECEIVED */
.other {
  align-self: flex-start;
  background: #050505;
  border: 1px solid #1a1a1a;
}

/* META */
.meta {
  font-size: 10px;
  color: #888;
  margin-top: 4px;
  text-align: right;
}

/* INPUT AREA */
.input-area {
  display: flex;
  padding: 10px;
  background: #050505;
  border-top: 1px solid #1a1a1a;
}

input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 20px;
  border: 1px solid #222;
  background: #111;
  color: white;
  outline: none;
}

/* SEND BUTTON */
button {
  margin-left: 10px;
  padding: 10px 14px;
  border-radius: 50%;
  border: 1px solid #222;
  background: #111;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1a1a1a;
}
</style>
</head>

<body>

<div class="header">
  <span class="back" onclick="goBack()">⬅</span>
  <h3>Chat</h3>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
  <input id="msgInput" placeholder="Type a message..." />
  <button onclick="sendMessage()">➤</button>
</div>

<script>
const API = "https://lostfound-backend-52mp.onrender.com";

let currentUser = null;
let itemId = new URLSearchParams(window.location.search).get("itemId");

/* AUTH */
async function checkAuth() {
  const res = await fetch("/.auth/me");
  const data = await res.json();

  if (!data.clientPrincipal) {
    window.location.href = "/login";
    return;
  }

  currentUser = data.clientPrincipal.userDetails;
  loadMessages();
}

/* LOAD MESSAGES */
async function loadMessages() {
  const res = await fetch(API + "/messages/" + itemId);
  const data = await res.json();

  const chat = document.getElementById("chatBox");
  chat.innerHTML = "";

  data.forEach(msg => {
    const wrapper = document.createElement("div");
    wrapper.className = "msg-wrapper";

    const div = document.createElement("div");
    div.className = "msg " + (msg.sender === currentUser ? "me" : "other");

    div.innerHTML = `
      <div>${msg.message}</div>
      <div class="meta">${formatTime(msg.timestamp)}</div>
    `;

    wrapper.appendChild(div);
    chat.appendChild(wrapper);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* SEND */
async function sendMessage() {
  const input = document.getElementById("msgInput");
  const message = input.value.trim();

  if (!message) return;

  await fetch(API + "/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      itemId,
      message
    })
  });

  input.value = "";
  loadMessages();
}

/* TIME */
function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');
}

/* BACK */
function goBack() {
  window.history.back();
}

/* INIT */
checkAuth();

/* AUTO REFRESH */
setInterval(loadMessages, 2000);
</script>

</body>
</html>
