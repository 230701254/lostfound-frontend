<!DOCTYPE html>
<html>
<head>
  <title>Lost & Found</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    .location {
      color: gray;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>📦 Lost Items</h1>

<div class="loading" id="loading">Loading items...</div>
<div class="grid" id="items"></div>

<script>
async function loadItems() {
  const container = document.getElementById("items");
  const loading = document.getElementById("loading");

  try {
    const res = await fetch("https://lostfound-backend-52mp.onrender.com/lost");

    if (!res.ok) {
      throw new Error("Failed to fetch data");
    }

    const data = await res.json();

    loading.style.display = "none";
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = "<p>No items found 😢</p>";
      return;
    }

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${item.imageUrl}" alt="item image"/>
        <h3>${item.name}</h3>
        <p>${item.description}</p>
        <p class="location">📍 ${item.location}</p>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    loading.innerText = "❌ Failed to load items";
  }
}

loadItems();
</script>

</body>
