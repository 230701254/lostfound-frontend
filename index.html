<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lost & Found</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    .location {
      color: gray;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>📦 Lost Items</h1>

<div class="loading" id="loading">Loading...</div>
<div class="grid" id="items"></div>

<script>
async function loadItems() {
  const loading = document.getElementById("loading");

  try {
    const res = await fetch("https://lostfound-backend-52mp.onrender.com/lost");
    const data = await res.json();

    loading.style.display = "none";

    const container = document.getElementById("items");

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${item.imageUrl}" />
        <h3>${item.name}</h3>
        <p>${item.description}</p>
        <p class="location">📍 ${item.location}</p>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    loading.innerText = "❌ Failed to load items";
  }
}

loadItems();
</script>

</body>
</html>
