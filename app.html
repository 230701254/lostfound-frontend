<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lost & Found</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #e5e5e5;
}

.layout {
  display: grid;
  grid-template-columns: 230px 1fr;
}

.sidebar {
  height: 100vh;
  background: #050505;
  border-right: 1px solid #1a1a1a;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  color: #aaa;
  cursor: pointer;
}

.sidebar a:hover {
  background: #111;
  color: white;
}

.main {
  padding: 25px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #050505;
  border: 1px solid #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content {
  padding: 14px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📦 Lost & Found</h2>
    <a onclick="showPage('dashboard')">Dashboard</a>
    <a onclick="showPage('lost')">Lost</a>
    <a onclick="showPage('found')">Found</a>
    <a onclick="showPage('upload')">Upload</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="dashboardPage">
      <h2>Recent Items</h2>
      <div id="recentItems" class="grid"></div>
    </div>

    <div id="itemsPage" class="hidden">
      <h2 id="pageTitle"></h2>
      <div id="items" class="grid"></div>
    </div>

    <!-- CHAT -->
    <div id="chatSection" class="hidden">
      <h3>💬 Chat</h3>
      <div id="chatBox" style="height:250px;overflow:auto;border:1px solid #333;padding:10px"></div>

      <div style="margin-top:10px;display:flex;gap:10px;">
        <input id="msg" placeholder="Type message..." style="flex:1;" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>
</div>

<!-- SOCKET LIB -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- MAIN SCRIPT -->
<script>
const API = "https://lostfound-backend-52mp.onrender.com";

let currentUser = "test@rajalakshmi.edu.in"; // temp for testing
let currentData = [];
let currentType = "lost";
let currentItem = null;

// ✅ SOCKET INIT AFTER API
const socket = io(API, {
  transports: ["websocket"]
});

/* NAVIGATION */
function showPage(page) {
  document.getElementById("dashboardPage").classList.add("hidden");
  document.getElementById("itemsPage").classList.add("hidden");

  if (page === "dashboard") {
    document.getElementById("dashboardPage").classList.remove("hidden");
    loadRecent();
  }

  if (page === "lost" || page === "found") {
    document.getElementById("itemsPage").classList.remove("hidden");
    document.getElementById("pageTitle").innerText = page.toUpperCase();
    currentType = page;
    loadItems(page);
  }
}

/* LOAD ITEMS */
async function loadItems(type) {
  const data = await fetch(API+"/"+type).then(r=>r.json());
  currentData = data;
  render(data);
}

function render(data) {
  const container = document.getElementById("items");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.imageUrl}">
        <div class="content">
          <h3>${item.name}</h3>
          <p>${item.description}</p>

          <button onclick="openChat('${item.id}')">💬 Chat</button>
        </div>
      </div>
    `;
  });
}

/* CHAT FUNCTIONS */
async function openChat(itemId) {
  console.log("Chat clicked:", itemId);

  currentItem = itemId;
  document.getElementById("chatSection").classList.remove("hidden");

  socket.emit("joinRoom", { itemId });

  loadChatHistory(itemId);
}

function sendMessage() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  socket.emit("sendMessage", {
    itemId: currentItem,
    message: msg,
    user: currentUser
  });

  document.getElementById("msg").value = "";
}

socket.on("receiveMessage", (data) => {
  displayMessage(data);
});

async function loadChatHistory(itemId) {
  const res = await fetch(API + "/messages/" + itemId);
  const data = await res.json();

  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  data.forEach(displayMessage);
}

function displayMessage(msg) {
  const chatBox = document.getElementById("chatBox");

  chatBox.innerHTML += `
    <p><b>${msg.sender}</b>: ${msg.message}</p>
  `;

  chatBox.scrollTop = chatBox.scrollHeight;
}

/* INIT */
showPage("dashboard");
</script>

</body>
</html>
