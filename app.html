<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lost & Found</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #e5e5e5;
}

.layout {
  display: grid;
  grid-template-columns: 230px 1fr;
}

.sidebar {
  height: 100vh;
  background: #050505;
  border-right: 1px solid #1a1a1a;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  color: #aaa;
  cursor: pointer;
}

.sidebar a:hover {
  background: #111;
  color: white;
}

.main {
  padding: 25px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #050505;
  border: 1px solid #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content {
  padding: 14px;
}

.hidden {
  display: none;
}

.chat-box {
  height: 250px;
  overflow: auto;
  border: 1px solid #333;
  padding: 10px;
  background: #050505;
}

.my-msg {
  text-align: right;
  color: #4ade80;
}

.other-msg {
  text-align: left;
  color: #60a5fa;
}
</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📦 Lost & Found</h2>
    <a onclick="showPage('lost')">Lost</a>
    <a onclick="showPage('found')">Found</a>
    <a onclick="showPage('upload')">Upload</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- ITEMS -->
    <div id="itemsPage">
      <h2 id="pageTitle"></h2>
      <div id="items" class="grid"></div>
    </div>

    <!-- UPLOAD -->
    <div id="uploadPage" class="hidden">
      <h2>Upload Item</h2>

      <input id="name" placeholder="Item name"><br><br>
      <input id="desc" placeholder="Description"><br><br>
      <input id="loc" placeholder="Location"><br><br>
      <input type="file" id="img"><br><br>

      <button onclick="uploadItem('lost')">Upload Lost</button>
      <button onclick="uploadItem('found')">Upload Found</button>
    </div>

    <!-- CHAT -->
    <div id="chatSection" class="hidden">
      <h3>💬 Chat</h3>

      <div id="chatBox" class="chat-box"></div>

      <div style="margin-top:10px;display:flex;gap:10px;">
        <input id="msg" placeholder="Type message..." style="flex:1;" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>
</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const API = "https://lostfound-backend-52mp.onrender.com";

let currentUser = "test@rajalakshmi.edu.in";
let currentType = "lost";
let currentItem = null;

// 🔥 SOCKET (polling for Render)
const socket = io(API, {
  transports: ["polling"]
});

/* NAVIGATION */
function showPage(page) {
  document.getElementById("itemsPage").classList.add("hidden");
  document.getElementById("uploadPage").classList.add("hidden");

  if (page === "upload") {
    document.getElementById("uploadPage").classList.remove("hidden");
    return;
  }

  document.getElementById("itemsPage").classList.remove("hidden");
  document.getElementById("pageTitle").innerText = page.toUpperCase();

  currentType = page;
  loadItems(page);
}

/* LOAD ITEMS */
async function loadItems(type) {
  const data = await fetch(API + "/" + type).then(r => r.json());
  render(data);
}

/* RENDER */
function render(data) {
  const container = document.getElementById("items");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.imageUrl}">
        <div class="content">
          <h3>${item.name}</h3>
          <p>${item.description}</p>
          <p>📍 ${item.location}</p>

          <button onclick="openChat('${item.id}')">💬 Chat</button>
        </div>
      </div>
    `;
  });
}

/* UPLOAD */
async function uploadItem(type) {
  const formData = new FormData();

  formData.append("name", document.getElementById("name").value);
  formData.append("description", document.getElementById("desc").value);
  formData.append("location", document.getElementById("loc").value);
  formData.append("image", document.getElementById("img").files[0]);

  await fetch(API + "/" + type, {
    method: "POST",
    body: formData
  });

  alert("Uploaded!");
  showPage(type);
}

/* CHAT */
function openChat(itemId) {
  currentItem = itemId;

  document.getElementById("chatSection").classList.remove("hidden");
  document.getElementById("chatSection").scrollIntoView({ behavior: "smooth" });

  socket.emit("joinRoom", { itemId });

  loadChatHistory(itemId);
}

function sendMessage() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  socket.emit("sendMessage", {
    itemId: currentItem,
    message: msg,
    user: currentUser
  });

  document.getElementById("msg").value = "";
}

socket.on("receiveMessage", (data) => {
  displayMessage(data);
});

/* LOAD CHAT */
async function loadChatHistory(itemId) {
  try {
    const res = await fetch(API + "/messages/" + itemId);
    const data = await res.json();

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    data.forEach(displayMessage);
  } catch (err) {
    console.error("Chat load error", err);
  }
}

/* DISPLAY MESSAGE */
function displayMessage(msg) {
  const chatBox = document.getElementById("chatBox");

  const cls = msg.sender === currentUser ? "my-msg" : "other-msg";

  chatBox.innerHTML += `
    <div class="${cls}">
      <b>${msg.sender}</b><br/>
      ${msg.message}
    </div>
  `;

  chatBox.scrollTop = chatBox.scrollHeight;
}

/* INIT */
showPage("lost");
</script>

</body>
</html>
