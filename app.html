<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lost & Found</title>

<style>
body { margin:0; font-family:Inter; background:#000; color:#e5e5e5; }
.layout { display:grid; grid-template-columns:230px 1fr; }

.sidebar {
  height:100vh;
  background:#050505;
  border-right:1px solid #1a1a1a;
  padding:20px;
}

.sidebar h2 { margin-bottom:25px; font-size:18px; }

.sidebar a {
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  color:#aaa;
  cursor:pointer;
}

.sidebar a:hover { background:#111; color:white; }

.main { padding:25px; }

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

button {
  padding:8px 12px;
  background:#111;
  border:1px solid #222;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.hero {
  background:#0f0f0f;
  border:1px solid #1a1a1a;
  padding:25px;
  border-radius:12px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#050505;
  border:1px solid #1a1a1a;
  border-radius:12px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.content { padding:14px; }

.badge { font-size:11px; padding:4px 8px; border-radius:6px; }
.lost { background:#2a0a0a; color:#ff4d4d; }
.found { background:#0a2a1a; color:#22c55e; }

.delete-btn {
  background:#1a0a0a;
  border:1px solid #330000;
  color:#ff4d4d;
  margin-top:8px;
}

.chat-btn {
  background:#0a1a2a;
  border:1px solid #003366;
  color:#3b82f6;
  margin-top:8px;
}

.hidden { display:none; }

.upload-card {
  width:420px;
  margin:auto;
  background:#050505;
  padding:25px;
  border-radius:12px;
  border:1px solid #1a1a1a;
}

.upload-card input, select {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#111;
  border:1px solid #222;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>📦 Lost & Found</h2>
  <a onclick="showPage('dashboard')">Dashboard</a>
  <a onclick="showPage('lost')">Lost</a>
  <a onclick="showPage('found')">Found</a>
  <a onclick="showPage('upload')">Upload</a>
</div>

<div class="main">

<div class="topbar">
  <div id="userArea"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="dashboardPage">
  <div class="hero">
    <h1>Welcome back 👋</h1>
  </div>
  <h2>Items</h2>
  <div id="items" class="grid"></div>
</div>

<div id="uploadPage" class="hidden">
  <div class="upload-card">
    <form id="itemForm">
      <input id="name" placeholder="Name" required />
      <input id="description" placeholder="Description" required />
      <input id="location" placeholder="Location" required />
      <select id="type">
        <option value="lost">Lost</option>
        <option value="found">Found</option>
      </select>
      <input type="file" id="image" required />
      <button type="submit">Upload</button>
    </form>
  </div>
</div>

</div>
</div>

<script>
const API = "https://lostfound-backend-52mp.onrender.com";
const BLOCKED_USER = "230701246@rajalakshmi.edu.in";

let currentUser = null;
let currentType = "lost";

/* AUTH */
async function checkAuth() {
  const res = await fetch("/.auth/me");
  const data = await res.json();

  if (!data.clientPrincipal) return;

  const user = data.clientPrincipal.userDetails;

  if (user === BLOCKED_USER) {
    alert("Access denied ❌");
    window.location.href = "/logout";
    return;
  }

  currentUser = user;
  userArea.innerText = "👤 " + user;

  loadItems();
}

/* LOAD ITEMS */
async function loadItems(){
  const data = await fetch(API+"/lost").then(r=>r.json());

  items.innerHTML = "";

  data.forEach(item=>{
    items.innerHTML += `
      <div class="card">
        <img src="${item.imageUrl}">
        <div class="content">
          <h3>${item.name}</h3>
          <p>${item.location}</p>

          ${item.user !== currentUser ? `
            <button class="chat-btn"
              onclick="openChat('${item.id}')">💬 Chat</button>` : ""}

          ${item.user === currentUser ? `
            <button class="delete-btn"
              onclick="deleteItem('${item.id}')">Delete</button>` : ""}
        </div>
      </div>
    `;
  });
}

/* CHAT */
function openChat(id){
  window.location.href = "chat.html?itemId=" + id;
}

/* DELETE */
async function deleteItem(id){
  await fetch(API+"/lost/"+id,{
    method:"DELETE",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ user: currentUser })
  });
  loadItems();
}

/* UPLOAD */
itemForm.addEventListener("submit", async e=>{
  e.preventDefault();

  const fd = new FormData();
  fd.append("name", name.value);
  fd.append("description", description.value);
  fd.append("location", location.value);
  fd.append("image", image.files[0]);
  fd.append("user", currentUser);

  await fetch(API+"/lost",{ method:"POST", body:fd });

  alert("Uploaded");
  loadItems();
});

/* LOGOUT */
function logout(){
  window.location.href="/logout";
}

checkAuth();
</script>

</body>
</html>
